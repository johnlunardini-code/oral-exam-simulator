<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>UCBM Exam Tutor - Biomedical Engineering</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 8px; margin: 0; overflow-x: hidden; box-sizing: border-box; }
        * { box-sizing: border-box; }
        
        .container { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); width: 100%; max-width: 900px; height: 98vh; overflow: hidden; display: flex; flex-direction: column; position: relative; z-index: 1; }
        
        header { padding: 16px; text-align: center; flex-shrink: 0; border-bottom: 1px solid #eee; }
        h1 { color: #333; margin: 0 0 5px 0; font-size: 24px; }
        .subtitle { color: #666; font-size: 13px; margin: 0; }
        
        .start-screen, .exam-screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 0 16px 16px 16px; }
        .start-screen.active, .exam-screen.active { display: flex; }
        
        .exam-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 16px; border-radius: 6px; margin: 12px 0 8px 0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .course-name { font-size: 14px; font-weight: 700; }
        
        .chat-area { border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; flex: 1; overflow-y: auto; background: #f9f9f9; font-size: 12px; margin-bottom: 0; }
        .message-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
        .message { padding: 10px 12px; border-radius: 8px; line-height: 1.5; word-wrap: break-word; }
        .message.question { background: #e3f2fd; border-left: 4px solid #667eea; align-self: flex-start; max-width: 85%; }
        .message.answer { background: #f0e8fe; border-left: 4px solid #764ba2; align-self: flex-end; max-width: 85%; }
        .message.question-header { background: #f3e5f5; border-left: 4px solid #764ba2; align-self: center; max-width: 95%; text-align: center; font-weight: 600; color: #764ba2; padding: 6px 12px; margin: 8px 0; }
        .message-label { font-weight: 600; font-size: 11px; color: #666; margin-bottom: 3px; text-transform: uppercase; }
        .message-text { color: #333; font-size: 12px; white-space: pre-wrap; word-wrap: break-word; }
        .message-actions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .action-btn { background: #667eea; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 600; }
        .action-btn:hover { background: #764ba2; }
        
        /* TTS Controls Bar - REPLACED PROFESSOR SPEAKING INDICATOR */
        .tts-controls-bar {
            display: none;
            background: white;
            border-top: 2px solid #667eea;
            padding: 8px;
            flex-shrink: 0;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            font-size: 11px;
        }
        .tts-controls-bar.active {
            display: flex;
        }
        .tts-progress-wrapper {
            width: 100%;
            display: flex;
            gap: 4px;
            align-items: center;
            margin-bottom: 6px;
        }
        .tts-progress-label {
            font-size: 9px;
            color: #666;
            min-width: 50px;
        }
        .tts-progress-bar {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }
        .tts-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.1s linear;
        }
        .tts-button-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .tts-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tts-btn:hover { background: #764ba2; }
        .tts-btn.secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }
        .tts-btn.secondary:hover { background: #e8e8e8; }
        .tts-speed-group {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tts-speed-btn {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            padding: 3px 5px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 8px;
            font-weight: 600;
        }
        .tts-speed-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .tts-speed-btn:hover { background: #e8e8e8; }
        .tts-speed-btn.active:hover { background: #764ba2; }
        
        .input-container { display: flex; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
        .text-editor { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .formatting-toolbar { background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px 4px 0 0; padding: 6px; display: flex; gap: 4px; flex-wrap: wrap; font-size: 11px; }
        .format-btn { background: white; border: 1px solid #ddd; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-weight: 600; font-size: 11px; transition: all 0.2s; }
        .format-btn:hover { background: #e8f0fe; border-color: #667eea; }
        textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 0 0 4px 4px; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; font-size: 12px; resize: vertical; overflow: auto; min-height: 80px; max-height: 200px; line-height: 1.5; }
        
        .button-col { display: flex; gap: 6px; flex-direction: column; flex-shrink: 0; }
        @media (max-width: 480px) {
            .input-container { flex-direction: column; }
            .text-editor { width: 100%; }
            .button-col { flex-direction: row; flex-wrap: wrap; gap: 4px; }
        }
        
        .icon-btn { padding: 10px 8px; font-size: 11px; border-radius: 6px; display: flex; align-items: center; justify-content: center; gap: 4px; font-weight: 600; white-space: nowrap; min-width: 60px; cursor: pointer; border: none; transition: all 0.3s; }
        .icon-btn:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #764ba2; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        
        .bottom-controls { display: flex; gap: 8px; flex-shrink: 0; }
        .bottom-controls button { flex: 1; padding: 10px; font-size: 12px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; }
        
        .speech-feedback { font-size: 12px; color: #27ae60; padding: 8px; background: #e8f8f5; border-radius: 4px; margin-top: 4px; text-align: center; font-weight: 600; }
        .professor-speaking-indicator { font-size: 12px; color: #667eea; padding: 8px; background: #e3f2fd; border-radius: 4px; margin-top: 4px; text-align: center; font-weight: 600; animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.5; } }
        
        /* Sentence highlighting */
        .sentence-highlighted {
            background: #ffeb3b;
            font-weight: 600;
            padding: 2px 4px;
            border-radius: 2px;
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 UCBM Exam Tutor</h1>
            <p class="subtitle">Biomedical Engineering - Piano degli Studi 2025-2026</p>
        </header>

        <!-- Start Screen -->
        <div class="start-screen active">
            <p style="text-align: center; color: #667eea; font-weight: 600; margin: 12px 0;">Select a course to start.</p>
        </div>

        <!-- Exam Screen -->
        <div class="exam-screen">
            <div class="exam-header">
                <div class="course-name" id="courseName"></div>
                <div style="font-size: 11px;">Q<span id="questionCount">1</span></div>
            </div>

            <div class="chat-area" id="chatArea"></div>

            <!-- TTS Controls Bar (replaces "Professor speaking") -->
            <div class="tts-controls-bar" id="ttsControlsBar">
                <div class="tts-progress-wrapper">
                    <span class="tts-progress-label">Progress:</span>
                    <div class="tts-progress-bar">
                        <div class="tts-progress-fill" id="ttsProgressFill"></div>
                    </div>
                </div>
                <div class="tts-button-row">
                    <button class="tts-btn" id="playerPlayPauseBtn" onclick="togglePlayerPlayPause()">⏸ Pause</button>
                    <button class="tts-btn" onclick="stopPlayerPlayback()">⏹ Stop</button>
                    <button class="tts-btn secondary" onclick="playerRewind()">⏮ -10s</button>
                    <button class="tts-btn secondary" onclick="playerForward()">⏭ +10s</button>
                    <div class="tts-speed-group" id="ttsSpeedControls">
                        <button class="tts-speed-btn" onclick="setPlayerSpeed(0.5)">0.5x</button>
                        <button class="tts-speed-btn" onclick="setPlayerSpeed(0.75)">0.75x</button>
                        <button class="tts-speed-btn active" onclick="setPlayerSpeed(1.0)">1.0x</button>
                        <button class="tts-speed-btn" onclick="setPlayerSpeed(1.25)">1.25x</button>
                        <button class="tts-speed-btn" onclick="setPlayerSpeed(1.5)">1.5x</button>
                        <button class="tts-speed-btn" onclick="setPlayerSpeed(2.0)">2.0x</button>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="text-editor">
                    <div class="formatting-toolbar">
                        <button class="format-btn" onclick="insertBold()"><strong>B</strong></button>
                        <button class="format-btn" onclick="insertItalic()"><em>I</em></button>
                        <button class="format-btn" onclick="insertUnderline()"><u>U</u></button>
                        <button class="format-btn" onclick="insertCode()">&lt;/&gt;</button>
                        <button class="format-btn" onclick="insertList()">• List</button>
                        <button class="format-btn" onclick="insertFormula()">𝑥²</button>
                        <button class="format-btn" onclick="insertURL()">🔗 URL</button>
                    </div>
                    <textarea id="answerInput" placeholder="Type answer or use speech..."></textarea>
                    <div id="speechFeedback"></div>
                </div>
                <div class="button-col">
                    <button class="icon-btn btn-primary" onclick="submitAnswer()">✓ Send</button>
                    <button class="icon-btn btn-secondary" onclick="toggleSpeech()" id="speechButton">🎤 Speak</button>
                    <button class="icon-btn btn-secondary" onclick="toggleMute()" id="muteButton">🔊 Mute</button>
                    <button class="icon-btn btn-secondary" onclick="document.getElementById('attachInput').click()">📎 Attach</button>
                    <input type="file" id="attachInput" style="display: none;" onchange="handleAttachUpload(event)">
                </div>
            </div>

            <div class="bottom-controls">
                <button class="btn-primary" onclick="getScore()" style="flex: 1;">📊 Get Score</button>
                <button class="btn-secondary" onclick="generateHint()" style="flex: 1;">💡 Hint</button>
                <button class="btn-success" onclick="openHistory()" style="flex: 1;">📋 History</button>
                <button class="btn-success" onclick="openFeedback()" style="flex: 1;">💬 Feedback</button>
                <button class="btn-danger" onclick="endExam()" style="flex: 1;">End Exam</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentSessionId = null;
        let currentQuestionText = '';
        let currentPlayerSpeed = 1.0;
        let currentUtterance = null;
        let isTTSPaused = false;
        let ttsStartTime = 0;
        let ttsPausedTime = 0;
        let ttsUpdateInterval = null;
        let speechSynthesisEnabled = true;
        let isProfessorSpeaking = false;

        function updatePlayerUI() {
            if (!currentUtterance) return;
            const elapsed = (Date.now() - ttsStartTime) / 1000;
            const duration = 30;
            const progress = Math.min(elapsed / duration, 1);
            const bar = document.getElementById('ttsProgressFill');
            if (bar) bar.style.width = (progress * 100) + '%';
        }

        function initTTSUpdateInterval() {
            if (ttsUpdateInterval) clearInterval(ttsUpdateInterval);
            ttsUpdateInterval = setInterval(updatePlayerUI, 100);
        }

        function clearTTSUpdateInterval() {
            if (ttsUpdateInterval) {
                clearInterval(ttsUpdateInterval);
                ttsUpdateInterval = null;
            }
        }

        function togglePlayerPlayPause() {
            if (!currentUtterance) return;
            if (isTTSPaused) {
                speechSynthesis.resume();
                isTTSPaused = false;
                ttsStartTime = Date.now() - (ttsPausedTime * 1000);
                document.getElementById('playerPlayPauseBtn').textContent = '⏸ Pause';
                initTTSUpdateInterval();
            } else {
                speechSynthesis.pause();
                isTTSPaused = true;
                ttsPausedTime = (Date.now() - ttsStartTime) / 1000;
                document.getElementById('playerPlayPauseBtn').textContent = '▶ Resume';
                clearTTSUpdateInterval();
            }
        }

        function stopPlayerPlayback() {
            speechSynthesis.cancel();
            document.getElementById('ttsControlsBar').classList.remove('active');
            isTTSPaused = false;
            clearTTSUpdateInterval();
            isProfessorSpeaking = false;
            document.getElementById('speechFeedback').innerHTML = '';
        }

        function playerRewind() {
            if (!currentQuestionText) return;
            const text = currentQuestionText;
            stopPlayerPlayback();
            setTimeout(() => speakText(text), 100);
        }

        function playerForward() {
            if (!isTTSPaused) {
                speechSynthesis.pause();
                isTTSPaused = true;
                ttsPausedTime = (Date.now() - ttsStartTime) / 1000;
                document.getElementById('playerPlayPauseBtn').textContent = '▶ Resume';
                clearTTSUpdateInterval();
            }
        }

        function setPlayerSpeed(speed) {
            currentPlayerSpeed = speed;
            document.querySelectorAll('.tts-speed-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tts-speed-btn[onclick*="${speed}"]`).classList.add('active');
            // Don't restart speech on speed change
        }

        function speakText(text) {
            if (!text || !speechSynthesisEnabled) return;
            
            speechSynthesis.cancel();
            clearTTSUpdateInterval();
            
            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.rate = currentPlayerSpeed;
            currentUtterance.pitch = 1.0;
            currentUtterance.volume = 1.0;
            
            const voices = speechSynthesis.getVoices();
            if (voices.length > 0) currentUtterance.voice = voices[0];
            
            isProfessorSpeaking = true;
            document.getElementById('ttsControlsBar').classList.add('active');
            
            currentUtterance.onstart = () => {
                ttsStartTime = Date.now();
                ttsPausedTime = 0;
                isTTSPaused = false;
                document.getElementById('playerPlayPauseBtn').textContent = '⏸ Pause';
                initTTSUpdateInterval();
            };
            
            currentUtterance.onend = () => {
                isProfessorSpeaking = false;
                document.getElementById('ttsControlsBar').classList.remove('active');
                clearTTSUpdateInterval();
            };
            
            currentUtterance.onerror = () => {
                isProfessorSpeaking = false;
                document.getElementById('ttsControlsBar').classList.remove('active');
                clearTTSUpdateInterval();
            };
            
            speechSynthesis.speak(currentUtterance);
        }

        function toggleMute() {
            speechSynthesisEnabled = !speechSynthesisEnabled;
            const btn = document.getElementById('muteButton');
            if (!speechSynthesisEnabled) {
                speechSynthesis.cancel();
                isProfessorSpeaking = false;
                document.getElementById('ttsControlsBar').classList.remove('active');
                btn.textContent = '🔇 Mute (OFF)';
                btn.style.background = '#95a5a6';
            } else {
                btn.textContent = '🔊 Mute';
                btn.style.background = '#764ba2';
                if (currentQuestionText) {
                    setTimeout(() => {
                        if (speechSynthesisEnabled && !isProfessorSpeaking) {
                            speakText(currentQuestionText);
                        }
                    }, 100);
                }
            }
        }

        async function startExam(courseId) {
            try {
                const response = await fetch(`${API_BASE}/api/exam/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subject: courseId, studentName: 'Student' }),
                });
                const data = await response.json();
                currentSessionId = data.sessionId;
                currentQuestionText = '';
                
                document.querySelector('.start-screen').classList.remove('active');
                document.querySelector('.exam-screen').classList.add('active');
                document.getElementById('courseName').textContent = data.courseName;
                document.getElementById('chatArea').innerHTML = '';
                
                setTimeout(() => getQuestion(''), 500);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function getQuestion(studentAnswer) {
            try {
                const chatArea = document.getElementById('chatArea');
                
                const response = await fetch(`${API_BASE}/api/exam/question`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId, studentAnswer }),
                });
                
                if (!response.ok) throw new Error('Failed to get question');
                
                const data = await response.json();
                
                const qGroup = document.createElement('div');
                qGroup.className = 'message-group';
                const qMsg = document.createElement('div');
                qMsg.className = 'message question-header';
                qMsg.textContent = `Question ${data.questionNumber || 1}`;
                qGroup.appendChild(qMsg);
                chatArea.appendChild(qGroup);

                const group = document.createElement('div');
                group.className = 'message-group';
                const msg = document.createElement('div');
                msg.className = 'message question';
                msg.innerHTML = `<div class="message-label">Professor</div><div class="message-text">${data.response}</div>
                    <div class="message-actions">
                        <button class="action-btn" onclick="speakText(this.parentElement.previousElementSibling.textContent)">🔊 Speak</button>
                    </div>`;
                group.appendChild(msg);
                chatArea.appendChild(group);
                
                currentQuestionText = data.response;
                document.getElementById('questionCount').textContent = data.questionNumber || 1;
                document.getElementById('answerInput').value = '';
                
                setTimeout(() => speakText(data.response), 800);
                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function insertBold() { wrapSelection('<b>', '</b>'); }
        function insertItalic() { wrapSelection('<i>', '</i>'); }
        function insertUnderline() { wrapSelection('<u>', '</u>'); }
        function insertCode() { wrapSelection('<code>', '</code>'); }
        function insertList() {
            const textarea = document.getElementById('answerInput');
            const lines = textarea.value.split('\n');
            textarea.value = lines.map(l => (l.trim() ? '• ' + l : l)).join('\n');
        }
        function insertFormula() { wrapSelection('[', ']'); }
        function insertURL() { wrapSelection('(', ')'); }
        function wrapSelection(before, after) {
            const textarea = document.getElementById('answerInput');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selected = text.substring(start, end) || 'text';
            textarea.value = text.substring(0, start) + before + selected + after + text.substring(end);
        }

        async function submitAnswer() {
            const answer = document.getElementById('answerInput').value.trim();
            if (!answer) {
                alert('Please enter an answer.');
                return;
            }
            await getQuestion(answer);
        }

        async function getScore() {
            try {
                const response = await fetch(`${API_BASE}/api/exam/session/${currentSessionId}`);
                const data = await response.json();
                const correct = data.scoreTracker.correct;
                const total = data.scoreTracker.total;
                const percentage = total > 0 ? Math.round(correct / total * 100) : 0;
                const italianScore = Math.round(percentage * 30 / 100);
                alert(`Score: ${correct}/${total}\nPercentage: ${percentage}%\nItalian: ${italianScore}/30`);
            } catch (error) {
                alert('Error getting score: ' + error.message);
            }
        }

        function generateHint() {
            alert('Hint feature - connect to backend');
        }

        function openHistory() {
            alert('History feature - connect to backend');
        }

        function openFeedback() {
            alert('Feedback feature - connect to backend');
        }

        function handleAttachUpload(event) {
            alert('Attachment feature - connect to backend');
        }

        async function endExam() {
            if (confirm('End exam?')) {
                speechSynthesis.cancel();
                clearTTSUpdateInterval();
                
                document.querySelector('.exam-screen').classList.remove('active');
                document.querySelector('.start-screen').classList.add('active');
                
                currentSessionId = null;
                currentQuestionText = '';
                isProfessorSpeaking = false;
            }
        }

        // Load courses on page load
        async function loadCourses() {
            try {
                const response = await fetch('/course-specs.json');
                const specs = await response.json();
                const startScreen = document.querySelector('.start-screen');
                
                let html = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 8px;margin-top:12px">';
                specs.courses.slice(0, 12).forEach(course => {
                    html += `<button onclick="startExam('${course.id}')" style="padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px;">${course.emoji} ${course.name}</button>`;
                });
                html += '</div>';
                startScreen.innerHTML += html;
            } catch (error) {
                console.error('Error loading courses:', error);
            }
        }

        loadCourses();
    </script>
</body>
</html>
