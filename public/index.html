<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Oral Exam Simulator - UCBM Bioengineering</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            margin: 0;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        * {
            box-sizing: border-box;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 900px;
            padding: 16px;
            max-height: 98vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
                border-radius: 8px;
                max-height: 99vh;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 4px;
            }
            .container {
                padding: 10px;
                max-height: 100vh;
                border-radius: 6px;
            }
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
        }

        .start-screen, .exam-screen {
            display: none;
        }

        .start-screen.active, .exam-screen.active {
            display: block;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        @media (min-width: 480px) {
            .subjects-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .subject-btn {
            padding: 12px 10px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .subject-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .exam-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .subject-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .chat-area {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px;
            height: 280px;
            overflow-y: auto;
            margin-bottom: 10px;
            background: #f9f9f9;
            font-size: 12px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 6px;
        }

        .message.professor {
            background: #e8f0fe;
            border-left: 4px solid #667eea;
        }

        .message.student {
            background: #f0e8fe;
            border-left: 4px solid #764ba2;
        }

        .message-label {
            font-weight: 600;
            font-size: 11px;
            color: #666;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .message-text {
            color: #333;
            font-size: 12px;
            line-height: 1.4;
        }

        .input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        textarea {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            resize: none;
            min-height: 60px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #764ba2;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .play-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }

        .feature-list {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 12px;
        }

        .feature-list h3 {
            color: #333;
            margin: 0 0 6px 0;
            font-size: 13px;
        }

        .feature-list ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .feature-list li {
            padding: 2px 0;
            color: #666;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .feature-list li::before {
            content: '✓';
            color: #667eea;
            font-weight: bold;
        }

        .sidebar {
            position: fixed;
            right: -90vw;
            top: 0;
            width: 90vw;
            max-width: 350px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.2);
            transition: right 0.3s ease;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            margin: 0;
            font-size: 14px;
        }

        .sidebar-close {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .sidebar-content {
            padding: 12px;
        }

        .sidebar-btn {
            position: fixed;
            right: 16px;
            bottom: 16px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            z-index: 999;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            padding: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Oral Exam</h1>
            <p class="subtitle">AI professor oral exam practice</p>
        </header>

        <!-- Start Screen -->
        <div class="start-screen active">
            <div class="feature-list">
                <h3>Features</h3>
                <ul>
                    <li>AI professor asking realistic exam questions</li>
                    <li>Speech recognition for oral practice</li>
                    <li>AI professor voice responses</li>
                    <li>Real-time feedback on answers</li>
                </ul>
            </div>

            <p style="color: #666; text-align: center; margin: 12px 0; font-size: 12px;">Select a subject:</p>

            <div class="subjects-grid">
                <button class="subject-btn" style="background: #667eea;" onclick="startExam('human-anatomy')">🦴 Anatomy</button>
                <button class="subject-btn" style="background: #764ba2;" onclick="startExam('general-physics')">⚡ Physics</button>
                <button class="subject-btn" style="background: #e74c3c;" onclick="startExam('physiology')">❤️ Physiology</button>
                <button class="subject-btn" style="background: #f39c12;" onclick="startExam('biomechanics')">🏃 Biomechanics</button>
                <button class="subject-btn" style="background: #16a085;" onclick="startExam('biomedical-instrumentation')">🔬 Biomedical</button>
                <button class="subject-btn" style="background: #2980b9;" onclick="startExam('advanced-physics')">🌌 Advanced Physics</button>
                <button class="subject-btn" style="background: #8e44ad;" onclick="startExam('economics-management')">💼 Econ & Mgmt</button>
            </div>
        </div>

        <!-- Exam Screen -->
        <div class="exam-screen">
            <div class="exam-header">
                <span class="subject-badge" id="subjectBadge"></span>
                <span style="font-size: 11px;">Q<span id="questionCount">1</span></span>
            </div>

            <div class="chat-area" id="chatArea"></div>

            <div class="input-area">
                <textarea id="answerInput" placeholder="Type or speak..."></textarea>
                <div style="display: flex; gap: 4px; flex-direction: column;">
                    <button class="btn-primary" onclick="submitAnswer()" style="padding: 6px 10px;">Send</button>
                    <button class="btn-secondary" onclick="toggleSpeech()" id="speechButton" style="padding: 6px 10px;">🎤</button>
                    <button class="btn-secondary" onclick="document.getElementById('imageInput').click()" style="padding: 6px 10px;">📷</button>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                </div>
            </div>

            <button class="btn-danger" onclick="endExam()" style="width: 100%;">End Exam</button>
        </div>

        <!-- Hint Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Study Hint</h3>
                <button class="sidebar-close" onclick="toggleSidebar()">×</button>
            </div>
            <div class="sidebar-content">
                <div id="hintResult">
                    <p style="color: #999; font-size: 12px;">Click 💡 for hints.</p>
                </div>
            </div>
        </div>
        <button class="sidebar-btn" onclick="generateHint()" title="Get Study Hint">💡</button>
    </div>

    <script>
        const API_BASE = '';
        let currentSessionId = null;
        let currentSubject = null;
        let isListening = false;
        let selectedVoice = null;
        const recognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        let speechRecognizer = null;

        function loadVoices() {
            const voices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voiceSelect');
            if (voiceSelect) {
                voices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `${voice.name}`;
                    voiceSelect.appendChild(option);
                });
            }
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();

        if (recognition) {
            speechRecognizer = new recognition();
            speechRecognizer.continuous = false;
            speechRecognizer.interimResults = true;
            speechRecognizer.lang = 'en-US';

            speechRecognizer.onstart = () => {
                isListening = true;
                updateSpeechButton();
            };

            speechRecognizer.onend = () => {
                isListening = false;
                updateSpeechButton();
            };

            speechRecognizer.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                if (event.results[event.results.length - 1].isFinal) {
                    document.getElementById('answerInput').value = transcript;
                    setTimeout(() => submitAnswer(), 500);
                }
            };
        }

        function updateSpeechButton() {
            const btn = document.getElementById('speechButton');
            if (isListening) {
                btn.style.background = '#e74c3c';
                btn.textContent = '⏹️';
            } else {
                btn.style.background = '#764ba2';
                btn.textContent = '🎤';
            }
        }

        function toggleSpeech() {
            if (!speechRecognizer) {
                alert('Speech recognition not supported');
                return;
            }
            if (isListening) {
                speechRecognizer.stop();
            } else {
                speechRecognizer.start();
            }
        }

        async function startExam(subject) {
            try {
                const response = await fetch(`${API_BASE}/api/exam/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subject }),
                });
                const data = await response.json();
                currentSessionId = data.sessionId;
                currentSubject = subject;
                document.querySelector('.start-screen').classList.remove('active');
                document.querySelector('.exam-screen').classList.add('active');
                document.getElementById('subjectBadge').textContent = subject.split('-').map(w => w.charAt(0).toUpperCase()).join('');
                document.getElementById('chatArea').innerHTML = '';
                getQuestion('');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function getQuestion(studentAnswer) {
            try {
                const chatArea = document.getElementById('chatArea');
                if (studentAnswer.trim()) {
                    const msg = document.createElement('div');
                    msg.className = 'message student';
                    msg.innerHTML = `<div class="message-label">You</div><div class="message-text">${studentAnswer}</div>`;
                    chatArea.appendChild(msg);
                }

                const loadingDiv = document.createElement('div');
                loadingDiv.id = 'loadingMessage';
                loadingDiv.className = 'loading';
                loadingDiv.textContent = 'Professor thinking...';
                chatArea.appendChild(loadingDiv);
                chatArea.scrollTop = chatArea.scrollHeight;

                const response = await fetch(`${API_BASE}/api/exam/question`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId, studentAnswer }),
                });
                const data = await response.json();

                loadingDiv.remove();

                const msg = document.createElement('div');
                msg.className = 'message professor';
                msg.innerHTML = `<div class="message-label">Professor</div><div class="message-text">${data.response}</div><button class="play-btn" onclick="speakText(\`${data.response.replace(/`/g, '\\`')}\`)">🔊 Speak</button>`;
                chatArea.appendChild(msg);

                setTimeout(() => speakText(data.response), 500);

                document.getElementById('questionCount').textContent = data.questionNumber;
                document.getElementById('answerInput').value = '';
                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function submitAnswer() {
            const answer = document.getElementById('answerInput').value.trim();
            if (!answer) return;
            await getQuestion(answer);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    getQuestion('Image uploaded - analyze it');
                };
                reader.readAsDataURL(file);
            }
        }

        function speakText(text) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            const voices = speechSynthesis.getVoices();
            let femaleVoice = voices.find(v => v.name.toLowerCase().includes('sonia') || v.name.toLowerCase().includes('female'));
            if (!femaleVoice && voices.length > 1) femaleVoice = voices[1];
            if (femaleVoice) utterance.voice = femaleVoice;
            speechSynthesis.speak(utterance);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        let currentHintData = null;

        async function generateHint() {
            if (!currentSessionId) {
                alert('Start an exam first');
                return;
            }
            toggleSidebar();
            const hintResult = document.getElementById('hintResult');
            hintResult.innerHTML = '<p style="text-align: center; color: #667eea; font-size: 12px;">Generating hint...</p>';

            try {
                const response = await fetch(`${API_BASE}/api/exam/hint`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId }),
                });
                const data = await response.json();
                currentHintData = data;
                hintResult.innerHTML = `
                    <div style="background: #f0f4ff; padding: 10px; border-radius: 6px; margin-bottom: 10px;">
                        <p style="color: #333; font-size: 12px; line-height: 1.5; margin: 0;">${data.textHint}</p>
                    </div>
                    <button class="btn-primary" onclick="getHintImage()" style="width: 100%; margin-bottom: 6px; padding: 6px;">📷 Show Image</button>
                    <button class="btn-secondary" onclick="toggleSidebar()" style="width: 100%; padding: 6px;">Close</button>
                `;
            } catch (error) {
                hintResult.innerHTML = '<p style="color: #e74c3c; font-size: 12px;">Error generating hint.</p>';
            }
        }

        async function getHintImage() {
            if (!currentHintData) return;
            const hintResult = document.getElementById('hintResult');
            hintResult.innerHTML = '<p style="text-align: center; color: #667eea; font-size: 12px;">Searching for images...</p>';

            try {
                const response = await fetch(`${API_BASE}/api/search-image?query=${encodeURIComponent(currentHintData.searchTerms)}`);
                const data = await response.json();
                if (data.imageUrl) {
                    hintResult.innerHTML = `
                        <img src="${data.imageUrl}" style="width: 100%; border-radius: 6px; margin-bottom: 8px;">
                        <p style="color: #999; font-size: 11px;">Source: ${data.source}</p>
                        <button class="btn-secondary" onclick="generateHint()" style="width: 100%; padding: 6px; margin-top: 6px;">📝 Back</button>
                    `;
                } else {
                    hintResult.innerHTML = `
                        <p style="color: #e74c3c; font-size: 12px;">No images found.</p>
                        <button class="btn-secondary" onclick="generateHint()" style="width: 100%; padding: 6px; margin-top: 6px;">Back</button>
                    `;
                }
            } catch (error) {
                hintResult.innerHTML = '<p style="color: #e74c3c; font-size: 12px;">Error fetching image.</p>';
            }
        }

        async function endExam() {
            if (confirm('End exam?')) {
                try {
                    await fetch(`${API_BASE}/api/exam/session/${currentSessionId}`, { method: 'DELETE' });
                } catch (e) {}
                document.querySelector('.exam-screen').classList.remove('active');
                document.querySelector('.start-screen').classList.add('active');
                currentSessionId = null;
            }
        }
    </script>
</body>
</html>
